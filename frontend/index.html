<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Beam Design System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>AI Beam Design System</h1>

        <textarea id="prompt" placeholder="Enter your design prompt..."></textarea>

        <button onclick="generate()">Generate Design</button>

        <div class="output">
            <h3>Results</h3>
            <p><strong>Steel Area:</strong> <span id="steel"></span></p>
            <p><strong>Bending Moment:</strong> <span id="moment"></span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
